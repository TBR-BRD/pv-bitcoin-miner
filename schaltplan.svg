<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrowData" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#111">
    PV-Überschuss-Mining – Schalt- und Signalplan
  </text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#666">
    Leistung = durchgezogen · Daten/Steuerung (LAN) = gestrichelt blau
  </text>

  <!-- PV -->
  <g>
    <rect x="40" y="100" width="150" height="70" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="115" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">PV-Module</text>
    <text x="115" y="150" text-anchor="middle" font-size="12" fill="#713f12">(Solargenerator)</text>
  </g>

  <!-- Wechselrichter -->
  <g>
    <rect x="40" y="230" width="150" height="70" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="115" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="#075985">Wechselrichter</text>
    <text x="115" y="280" text-anchor="middle" font-size="12" fill="#075985">DC → AC</text>
  </g>

  <!-- Hausverteilung -->
  <g>
    <rect x="300" y="200" width="180" height="130" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
    <text x="390" y="226" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Hausverteilung</text>
    <text x="390" y="246" text-anchor="middle" font-size="12" fill="#1e293b">Unterverteilung / Zähler</text>
    <!-- Shelly im Zählerpfad -->
    <rect x="320" y="262" width="140" height="50" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="390" y="282" text-anchor="middle" font-size="12.5" font-weight="700" fill="#166534">Shelly Pro 3EM</text>
    <text x="390" y="299" text-anchor="middle" font-size="11" fill="#166534">misst Netzbezug/-einspeisung</text>
  </g>

  <!-- Netz -->
  <g>
    <rect x="300" y="60" width="180" height="64" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="390" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">Öffentliches Netz</text>
    <text x="390" y="107" text-anchor="middle" font-size="12" fill="#5b21b6">Netzzähler</text>
  </g>

  <!-- Hausverbraucher -->
  <g>
    <rect x="300" y="400" width="180" height="64" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
    <text x="390" y="428" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Hausverbraucher</text>
    <text x="390" y="447" text-anchor="middle" font-size="12" fill="#1e293b">übrige Lasten</text>
  </g>

  <!-- Separater Stromkreis / LS-Schalter -->
  <g>
    <rect x="600" y="200" width="150" height="70" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="675" y="228" text-anchor="middle" font-size="13.5" font-weight="700" fill="#991b1b">Eigener Stromkreis</text>
    <text x="675" y="247" text-anchor="middle" font-size="12" fill="#991b1b">LS-Schalter B16,</text>
    <text x="675" y="262" text-anchor="middle" font-size="12" fill="#991b1b">Leitung 3×2,5 mm²</text>
  </g>

  <!-- Miner -->
  <g>
    <rect x="810" y="190" width="130" height="90" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="875" y="218" text-anchor="middle" font-size="13.5" font-weight="700" fill="#9a3412">Antminer</text>
    <text x="875" y="236" text-anchor="middle" font-size="13.5" font-weight="700" fill="#9a3412">S19K Pro</text>
    <text x="875" y="256" text-anchor="middle" font-size="11" fill="#9a3412">Braiins OS+</text>
    <text x="875" y="271" text-anchor="middle" font-size="11" fill="#9a3412">PSU APW12</text>
  </g>

  <!-- Router/Switch -->
  <g>
    <rect x="600" y="430" width="150" height="60" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="675" y="458" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1e40af">Router / Switch</text>
    <text x="675" y="476" text-anchor="middle" font-size="11" fill="#1e40af">LAN</text>
  </g>

  <!-- POWER LINES (solid) -->
  <!-- PV -> WR -->
  <line x1="115" y1="170" x2="115" y2="230" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="125" y="205" font-size="11" fill="#333">DC</text>
  <!-- WR -> Hausverteilung -->
  <line x1="190" y1="265" x2="300" y2="265" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="215" y="257" font-size="11" fill="#333">AC</text>
  <!-- Hausverteilung <-> Netz -->
  <line x1="390" y1="200" x2="390" y2="124" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="398" y="165" font-size="11" fill="#333">Bezug / Einspeisung</text>
  <!-- Hausverteilung -> Verbraucher -->
  <line x1="390" y1="330" x2="390" y2="400" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- Hausverteilung -> eigener Stromkreis -->
  <line x1="480" y1="235" x2="600" y2="235" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- eigener Stromkreis -> Miner -->
  <line x1="750" y1="235" x2="810" y2="235" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- DATA LINES (dashed blue) -->
  <!-- Shelly -> Router -->
  <path d="M 390 312 L 390 360 L 600 360 L 600 430" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrowData)"/>
  <text x="405" y="352" font-size="11" fill="#2563eb">Script auf Shelly</text>
  <!-- Router -> Miner (API) -->
  <path d="M 750 455 L 875 455 L 875 280" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrowData)"/>
  <text x="765" y="447" font-size="11" fill="#2563eb">REST-API: Power-Target</text>

  <!-- Hinweisbox -->
  <g>
    <rect x="40" y="500" width="880" height="90" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
    <text x="60" y="528" font-size="13" font-weight="700" fill="#92400e">⚠ Sicherheit</text>
    <text x="60" y="550" font-size="12" fill="#78350f">Der elektrische Anschluss (eigener Stromkreis, LS-Schalter, ggf. FI/RCD, Leitungsquerschnitt) ist von einer</text>
    <text x="60" y="568" font-size="12" fill="#78350f">Elektrofachkraft auszuführen. Der S19K Pro erzeugt ~2 kW Abwärme und ist sehr laut – Aufstellung in</text>
    <text x="60" y="586" font-size="12" fill="#78350f">belüftetem, schallentkoppeltem Raum. Der Shelly Pro 3EM ist ein Messgerät und schaltet keine Last direkt.</text>
  </g>
</svg>
